<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sidebar</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    .app-header {
      padding: 14px 16px 10px;
      flex-shrink: 0;
      background: rgba(10, 10, 20, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .app-header .top {
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-header .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .app-header .brand-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #0a0a14;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .app-header .brand h2 {
      font-size: 15px; font-weight: 600;
    }
    .app-header .brand .version {
      font-size: 10px; color: var(--text-muted); margin-left: 2px; font-family: var(--font-body);
    }
    .header-actions { display: flex; gap: 4px; }

    .model-bar {
      display: flex; gap: 6px; margin-top: 10px;
    }
    .model-bar select { flex: 1; font-size: 11px; padding: 6px 28px 6px 10px; }
    .model-bar select option { font-size: 12px; }

    .chat-area {
      flex: 1; overflow-y: auto; padding: 8px 12px 4px;
      scroll-behavior: smooth;
    }
    .chat-area:empty {
      display: flex; align-items: center; justify-content: center;
    }

    .msg-group {
      margin-bottom: 10px;
      animation: slideUp 0.25s ease forwards;
    }
    .msg-group.user { display: flex; flex-direction: column; align-items: flex-end; }
    .msg-group.ai { display: flex; flex-direction: column; align-items: flex-start; }

    .msg-bubble {
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 88%;
      word-wrap: break-word;
      position: relative;
      transition: all 0.2s ease;
    }
    .msg-group.user .msg-bubble {
      background: linear-gradient(135deg, var(--accent), #d97706);
      color: #0a0a14;
      border-radius: 14px 14px 4px 14px;
      font-weight: 500;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .msg-group.ai .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
      color: var(--text);
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 6px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .msg-group.user .msg-meta { justify-content: flex-end; }

    .msg-actions {
      display: flex; gap: 2px; margin-top: 4px; padding: 0 6px;
      opacity: 0; transition: opacity 0.2s;
    }
    .msg-group:hover .msg-actions { opacity: 1; }

    .msg-actions button {
      background: none; border: none; color: var(--text-muted);
      padding: 3px; cursor: pointer; border-radius: 4px;
      display: inline-flex; align-items: center; transition: all 0.15s;
    }
    .msg-actions button:hover { background: var(--surface-hover); color: var(--text-secondary); }

    .msg-bubble pre {
      background: rgba(0,0,0,0.3);
      padding: 10px; border-radius: 8px;
      overflow-x: auto; margin: 6px 0;
      font-size: 12px;
    }
    .msg-bubble code {
      background: rgba(0,0,0,0.3);
      padding: 1px 5px; border-radius: 4px;
      font-size: 12px;
    }
    .msg-bubble pre code { background: none; padding: 0; }

    .input-area {
      padding: 10px 12px 12px;
      flex-shrink: 0;
      background: rgba(10, 10, 20, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
    }
    .input-wrap {
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 4px;
      transition: all 0.2s;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: var(--surface-hover);
    }
    .input-wrap textarea {
      flex: 1;
      padding: 7px 10px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 13px;
      resize: none;
      min-height: 22px;
      max-height: 100px;
      outline: none;
      line-height: 1.5;
    }
    .input-wrap textarea::placeholder { color: var(--text-muted); }
    .input-wrap .send-btn {
      width: 34px; height: 34px; border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #0a0a14; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .input-wrap .send-btn:hover { transform: scale(1.05); }
    .input-wrap .send-btn:active { transform: scale(0.95); }
    .input-wrap .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 6px; padding: 0 4px;
    }
    .input-footer .hint { font-size: 11px; color: var(--text-muted); }
    .input-footer .clear-btn {
      font-size: 11px; color: var(--text-muted); background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.15s;
    }
    .input-footer .clear-btn:hover { color: var(--danger); background: var(--danger-bg); }

    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: 6px 0;
    }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .error-msg {
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      background: var(--danger-bg);
      border: 1px solid rgba(239, 68, 68, 0.2);
      font-size: 12px;
      color: var(--danger);
      animation: scaleIn 0.2s ease;
    }
    .error-msg .retry-btn {
      margin-top: 8px;
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .error-msg .retry-btn:hover {
      background: rgba(239, 68, 68, 0.25);
    }
  </style>
</head>
<body>
  <div class="app-header">
    <div class="top">
      <div class="brand">
        <div class="brand-icon">AI</div>
        <div>
          <h2>AI Sidebar</h2>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-ghost" id="settingsBtn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </div>
    <div class="model-bar">
      <select id="providerSelect">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="google">Google</option>
      </select>
      <select id="modelSelect"></select>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="messageInput" placeholder="Ask anything..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="hint">Ctrl+Enter</span>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
