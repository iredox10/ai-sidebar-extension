<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar</title>
  <link rel="stylesheet" href="styles.css">
  <script src="marked.min.js"></script>
</head>
<body class="layout-sidebar">
  
  <!-- Floating Glass Pill Header -->
  <header class="floating-header">
    <button class="icon-btn" id="historyToggle" title="History">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    
    <div class="model-selector-wrap">
      <div class="custom-select" id="modelDropdown">
        <button class="select-toggle" id="modelToggle">
          <span id="activeModelIcon" class="provider-icon"></span>
          <span id="activeModelName">Select Model</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div class="select-menu" id="modelMenu"></div>
      </div>
      <input type="hidden" id="providerSelect" value="openai">
      <input type="hidden" id="modelSelect" value="gpt-4o">
    </div>
    
    <button class="icon-btn" id="settingsBtn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
    </button>
    <button class="icon-btn" id="newChatBtn" title="New Chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
  </header>

  <!-- Main Chat Flow -->
  <main class="chat-container" id="chatArea">
    <!-- Messages injected here -->
  </main>

  <!-- Floating Input Island -->
  <div class="floating-input-area">
    <div class="attach-bar" id="attachBar" style="display:none;">
      <div class="attach-list" id="attachList"></div>
      <div class="attach-bar-info">Files added as context for the next message</div>
    </div>
    <div class="input-island">
      <button class="icon-btn attach-btn" id="attachBtn" title="Add files">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path></svg>
      </button>
      <textarea id="messageInput" placeholder="Message..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-send"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" class="icon-stop" style="display:none;"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>
      </button>
    </div>
  </div>
  
  <input type="file" id="fileInput" accept="image/*,.txt,.js,.ts,.py,.rs,.go,.java,.swift,.sh,.sql,.css,.scss,.html,.json,.xml,.yaml,.yml,.md,.csv" multiple style="display:none;">

  <!-- History Slide-over -->
  <div class="history-slideover" id="historyOverlay">
    <div class="history-panel" id="historyPanel">
      <div class="history-resize-handle" id="historyResizeHandle"></div>
      
      <div class="history-header">
        <h3>Chat History <span class="history-header-count" id="historyCount">0</span></h3>
        <button class="icon-btn" id="historyClose">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      
      <div class="history-search-wrap">
        <svg class="history-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="historySearch" class="history-search-input" placeholder="Search conversations...">
        <button class="history-search-clear" id="historySearchClear">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      
      <div class="history-list" id="historyList"></div>
      
      <div class="history-footer">
        <button class="history-new-btn" id="historyNewBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Conversation
        </button>
      </div>
    </div>
  </div>
  
  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <button class="context-item" data-action="rename">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Rename
    </button>
    <button class="context-item" data-action="pin">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/></svg>
      Pin to Top
    </button>
    <div class="context-divider"></div>
    <button class="context-item" data-action="copy-title">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copy Title
    </button>
    <div class="context-divider"></div>
    <button class="context-item danger" data-action="delete">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      Delete
    </button>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
