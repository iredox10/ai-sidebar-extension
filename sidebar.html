<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sidebar</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-header .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header h2 {
      font-size: 15px;
      font-weight: 600;
    }
    .model-bar {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .model-bar select {
      flex: 1;
      padding: 5px 24px 5px 8px;
      font-size: 11px;
      background-position: right 6px center;
      background-size: 10px;
    }
    .model-bar select option {
      font-size: 12px;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }
    .chat-area:empty::after {
      content: 'Send a message to start chatting. Right-click text on any page to ask about it.';
      display: block;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px 20px;
      font-size: 13px;
      line-height: 1.6;
    }
    .message {
      margin-bottom: 12px;
      max-width: 90%;
    }
    .message.user {
      margin-left: auto;
    }
    .message.ai {
      margin-right: auto;
    }
    .message-content {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .message.user .message-content {
      background: var(--user-msg);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.ai .message-content {
      background: var(--ai-msg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message.ai .message-content p {
      margin-bottom: 8px;
    }
    .message.ai .message-content p:last-child {
      margin-bottom: 0;
    }
    .message-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .copy-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      padding: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .message:hover .copy-btn {
      opacity: 1;
    }
    .copy-btn:hover {
      color: var(--text);
    }
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    .input-row textarea {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      resize: none;
      min-height: 40px;
      max-height: 120px;
      font-size: 13px;
    }
    .input-row textarea:focus {
      border-color: var(--primary);
    }
    .input-row textarea::placeholder {
      color: var(--text-secondary);
    }
    .input-row button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .input-row button:hover {
      background: var(--primary-hover);
    }
    .input-row button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .bottom-bar .hint {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .clear-btn {
      font-size: 11px;
      color: var(--text-secondary);
      background: none;
      border: none;
      padding: 2px 6px;
    }
    .clear-btn:hover {
      color: var(--danger);
    }
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 8px 0;
    }
    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    .error-msg {
      color: var(--danger);
      font-size: 12px;
      padding: 8px 12px;
      background: rgba(239,68,68,0.1);
      border-radius: 8px;
      border: 1px solid rgba(239,68,68,0.3);
      margin-bottom: 12px;
    }
    .message-content code {
      background: rgba(0,0,0,0.3);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 12px;
    }
    .message-content pre {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message-content pre code {
      background: none;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="sidebar-header">
    <div class="top-row">
      <h2>AI Sidebar</h2>
      <button class="btn-icon" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 10a2 2 0 100-4 2 2 0 000 4z" fill="currentColor"/>
          <path d="M13.5 8.5a5.5 5.5 0 01-.18 1.42l1.48 1.16-.5.86-1.66-.68a5.5 5.5 0 01-2.4 1.38L9.5 14h-1l-.74-1.36a5.5 5.5 0 01-2.4-1.38l-1.66.68-.5-.86 1.48-1.16A5.5 5.5 0 014.5 8.5c0-.48.06-.94.18-1.42L3.2 5.92l.5-.86 1.66.68a5.5 5.5 0 012.4-1.38L8.5 3h1l.74 1.36a5.5 5.5 0 012.4 1.38l1.66-.68.5.86-1.48 1.16c.12.48.18.94.18 1.42z" stroke="currentColor" stroke-width="1.2" fill="none"/>
        </svg>
      </button>
    </div>
    <div class="model-bar">
      <select id="providerSelect" class="select">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="google">Google</option>
      </select>
      <select id="modelSelect" class="select">
        <option value="gpt-4o">GPT-4o</option>
        <option value="gpt-4o-mini">GPT-4o Mini</option>
        <option value="gpt-4-turbo">GPT-4 Turbo</option>
      </select>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="messageInput" placeholder="Ask anything..." rows="1"></textarea>
      <button id="sendBtn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="bottom-bar">
      <span class="hint">Ctrl+Enter to send</span>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
