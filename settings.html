<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sidebar - Settings</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .page-header {
      margin-bottom: 32px;
    }
    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .page-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }
    .section {
      margin-bottom: 28px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-weight: 400;
    }
    .api-input {
      position: relative;
    }
    .api-input .input {
      padding-right: 80px;
    }
    .api-input .toggle-vis {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
    }
    .api-input .toggle-vis:hover {
      text-decoration: underline;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      margin-top: 6px;
    }
    .status-badge.saved {
      color: var(--success);
    }
    .status-badge.unsaved {
      color: var(--text-secondary);
    }
    .provider-icon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .provider-icon.openai { background: #10a37f; }
    .provider-icon.anthropic { background: #d97757; }
    .provider-icon.google { background: #4285f4; }
    .provider-icon.custom { background: #6b7280; }
    .save-all {
      position: sticky;
      bottom: 0;
      padding: 16px 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      margin-top: 32px;
    }
    .save-all button {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      justify-content: center;
    }
    .help-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 12px;
    }
    .help-link:hover {
      text-decoration: underline;
    }
    .row {
      display: flex;
      gap: 12px;
    }
    .row > * {
      flex: 1;
    }
    .system-prompt-area textarea {
      min-height: 120px;
      resize: vertical;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .checkbox-row input[type="checkbox"] {
      accent-color: var(--primary);
    }
    .checkbox-row label {
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>AI Sidebar Settings</h1>
    <p>Configure your API keys and preferences. Keys are stored locally in your browser.</p>
  </div>

  <div class="section">
    <div class="section-title">Default Provider</div>
    <select id="provider" class="select">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="google">Google</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">Default Model</div>
    <select id="model" class="select">
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o Mini</option>
      <option value="gpt-4-turbo">GPT-4 Turbo</option>
      <option value="o3-mini">o3 Mini</option>
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
      <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
      <option value="claude-3-5-haiku-20241022">Claude 3.5 Haiku</option>
      <option value="claude-opus-4-20250514">Claude Opus 4</option>
      <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
      <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">
      <span class="provider-icon openai">O</span>
      OpenAI
      <span class="badge">api.openai.com</span>
    </div>
    <div class="api-input">
      <input type="password" id="openaiKey" class="input" placeholder="sk-...">
      <button class="toggle-vis" data-target="openaiKey">Show</button>
    </div>
    <div class="status-badge unsaved" id="openaiStatus">Not saved</div>
  </div>

  <div class="section">
    <div class="section-title">
      <span class="provider-icon anthropic">A</span>
      Anthropic
      <span class="badge">api.anthropic.com</span>
    </div>
    <div class="api-input">
      <input type="password" id="anthropicKey" class="input" placeholder="sk-ant-...">
      <button class="toggle-vis" data-target="anthropicKey">Show</button>
    </div>
    <div class="status-badge unsaved" id="anthropicStatus">Not saved</div>
  </div>

  <div class="section">
    <div class="section-title">
      <span class="provider-icon google">G</span>
      Google
      <span class="badge">makersuite.google.com</span>
    </div>
    <div class="api-input">
      <input type="password" id="googleKey" class="input" placeholder="AIza...">
      <button class="toggle-vis" data-target="googleKey">Show</button>
    </div>
    <div class="status-badge unsaved" id="googleStatus">Not saved</div>
  </div>

  <div class="section">
    <div class="section-title">System Prompt</div>
    <div class="system-prompt-area">
      <textarea id="systemPrompt" class="input" placeholder="You are a helpful assistant."></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Temperature</div>
    <div class="row items-center">
      <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" style="flex:1;accent-color:var(--primary);">
      <span id="tempValue" style="min-width:32px;text-align:center;font-size:14px;color:var(--text-secondary);">0.7</span>
    </div>
  </div>

  <div class="save-all">
    <button class="btn btn-primary" id="saveBtn">Save Settings</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
