<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="layout-settings">
  <div class="settings-header">
    <h1>Preferences</h1>
    <p>Manage your API keys and default behaviors.</p>
  </div>

  <div class="bento-grid">
    <!-- Models & Providers -->
    <div class="bento-card col-span-full" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div class="form-group">
        <label class="form-label">Default Provider</label>
        <select id="provider" class="select-styled">
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="google">Google</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Default Model</label>
        <select id="model" class="select-styled">
          <option value="gpt-4o">GPT-4o</option>
          <option value="gpt-4o-mini">GPT-4o Mini</option>
          <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
          <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
          <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
          <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        </select>
      </div>
    </div>

    <!-- OpenAI -->
    <div class="bento-card">
      <h3 class="bento-title">
        <div style="width: 20px; height: 20px; background: #fff; color: #000; border-radius: 4px; display:flex; align-items:center; justify-content:center; font-size:10px;">O</div>
        OpenAI
      </h3>
      <div class="form-group" style="position: relative;">
        <input type="password" id="openaiKey" class="input-styled" placeholder="sk-..." style="padding-right: 50px;">
        <button class="action-btn toggle-vis" data-target="openaiKey" style="position: absolute; right: 6px; top: 6px;">Show</button>
      </div>
      <div id="openaiStatus" style="font-size: 11px; margin-top: 8px; color: var(--text-tertiary);">Not configured</div>
    </div>

    <!-- Anthropic -->
    <div class="bento-card">
      <h3 class="bento-title">
        <div style="width: 20px; height: 20px; background: #fff; color: #000; border-radius: 4px; display:flex; align-items:center; justify-content:center; font-size:10px; font-family: serif;">A</div>
        Anthropic
      </h3>
      <div class="form-group" style="position: relative;">
        <input type="password" id="anthropicKey" class="input-styled" placeholder="sk-ant-..." style="padding-right: 50px;">
        <button class="action-btn toggle-vis" data-target="anthropicKey" style="position: absolute; right: 6px; top: 6px;">Show</button>
      </div>
      <div id="anthropicStatus" style="font-size: 11px; margin-top: 8px; color: var(--text-tertiary);">Not configured</div>
    </div>

    <!-- Google -->
    <div class="bento-card">
      <h3 class="bento-title">
        <div style="width: 20px; height: 20px; background: #fff; color: #000; border-radius: 4px; display:flex; align-items:center; justify-content:center; font-size:10px;">G</div>
        Google AI
      </h3>
      <div class="form-group" style="position: relative;">
        <input type="password" id="googleKey" class="input-styled" placeholder="AIza..." style="padding-right: 50px;">
        <button class="action-btn toggle-vis" data-target="googleKey" style="position: absolute; right: 6px; top: 6px;">Show</button>
      </div>
      <div id="googleStatus" style="font-size: 11px; margin-top: 8px; color: var(--text-tertiary);">Not configured</div>
    </div>

    <!-- System Prompt & Temp -->
    <div class="bento-card col-span-full">
      <div class="form-group">
        <label class="form-label">System Prompt</label>
        <textarea id="systemPrompt" class="input-styled" style="min-height: 80px; resize: vertical;" placeholder="You are a helpful assistant..."></textarea>
      </div>
      <div class="form-group" style="margin-top: 24px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <label class="form-label" style="margin: 0;">Temperature</label>
          <span id="tempValue" style="font-size: 12px; font-family: var(--font-mono); color: var(--text-primary);">0.7</span>
        </div>
        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" style="width: 100%;">
      </div>
    </div>
  </div>

  <div style="display: flex; justify-content: flex-end;">
    <button id="saveBtn" style="background: var(--accent); color: var(--accent-fg); font-weight: 500; font-size: 14px; padding: 12px 24px; border-radius: var(--radius-sm);">Save Changes</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
