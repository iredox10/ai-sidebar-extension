<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sidebar - Settings</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 32px 20px 80px;
      min-height: 100vh;
    }
    .page-header {
      margin-bottom: 32px;
      text-align: center;
    }
    .page-header .brand-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-family: var(--font-heading);
      font-size: 20px; font-weight: 700; color: #0a0a14;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .page-header h1 {
      font-size: 22px; font-weight: 700; margin-bottom: 4px;
    }
    .page-header p {
      color: var(--text-secondary); font-size: 14px;
    }

    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-family: var(--font-heading);
      font-size: 13px; font-weight: 600;
      margin-bottom: 10px; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }

    .provider-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s ease;
    }
    .provider-card:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .provider-card + .provider-card {
      margin-top: 12px;
    }
    .provider-card .top {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .provider-card .provider-icon {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading);
      font-size: 13px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .provider-card .provider-icon.openai { background: linear-gradient(135deg, #10a37f, #0d8c6e); }
    .provider-card .provider-icon.anthropic { background: linear-gradient(135deg, #d97757, #c06848); }
    .provider-card .provider-icon.google { background: linear-gradient(135deg, #4285f4, #3367d6); }
    .provider-card .provider-name {
      font-family: var(--font-heading);
      font-weight: 600; font-size: 14px; flex: 1;
    }
    .provider-card .provider-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 100px;
      background: var(--surface-hover); border: 1px solid var(--border-light);
      color: var(--text-muted);
    }
    .provider-card .api-input-wrap {
      position: relative;
    }
    .provider-card .api-input-wrap input {
      padding-right: 70px;
    }
    .provider-card .toggle-vis {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: var(--text-secondary); background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 4px;
      transition: all 0.15s;
    }
    .provider-card .toggle-vis:hover { color: var(--text); background: var(--surface-hover); }
    .provider-card .status-badge {
      font-size: 11px; margin-top: 6px; display: inline-flex; align-items: center; gap: 4px;
    }
    .provider-card .status-badge.saved { color: var(--success); }
    .provider-card .status-badge.unsaved { color: var(--text-muted); }

    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }

    .save-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 14px 20px;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: center;
    }
    .save-bar button {
      max-width: 600px; width: 100%; padding: 12px;
      font-size: 15px; font-weight: 600; justify-content: center;
    }

    textarea.input {
      min-height: 100px; resize: vertical;
    }

    input[type="range"] {
      width: 100%; height: 4px;
      appearance: none;
      background: var(--surface-hover);
      border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      box-shadow: 0 0 8px var(--accent-glow);
    }
  </style>
</head>
<body>
  <div class="page-header">
    <div class="brand-icon">AI</div>
    <h1>Settings</h1>
    <p>Configure your API keys and preferences. Everything stays in your browser.</p>
  </div>

  <div class="section">
    <div class="section-title">Default Provider</div>
    <select id="provider" class="select">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="google">Google</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">Default Model</div>
    <select id="model" class="select">
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o Mini</option>
      <option value="gpt-4-turbo">GPT-4 Turbo</option>
      <option value="o3-mini">o3 Mini</option>
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
      <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
      <option value="claude-3-5-haiku-20241022">Claude 3.5 Haiku</option>
      <option value="claude-opus-4-20250514">Claude Opus 4</option>
      <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
      <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">API Keys</div>

    <div class="provider-card">
      <div class="top">
        <div class="provider-icon openai">O</div>
        <span class="provider-name">OpenAI</span>
        <span class="provider-badge">api.openai.com</span>
      </div>
      <div class="api-input-wrap">
        <input type="password" id="openaiKey" class="input" placeholder="sk-...">
        <button class="toggle-vis" data-target="openaiKey">Show</button>
      </div>
      <div class="status-badge unsaved" id="openaiStatus">Not saved</div>
    </div>

    <div class="provider-card">
      <div class="top">
        <div class="provider-icon anthropic">A</div>
        <span class="provider-name">Anthropic</span>
        <span class="provider-badge">api.anthropic.com</span>
      </div>
      <div class="api-input-wrap">
        <input type="password" id="anthropicKey" class="input" placeholder="sk-ant-...">
        <button class="toggle-vis" data-target="anthropicKey">Show</button>
      </div>
      <div class="status-badge unsaved" id="anthropicStatus">Not saved</div>
    </div>

    <div class="provider-card">
      <div class="top">
        <div class="provider-icon google">G</div>
        <span class="provider-name">Google</span>
        <span class="provider-badge">makersuite.google.com</span>
      </div>
      <div class="api-input-wrap">
        <input type="password" id="googleKey" class="input" placeholder="AIza...">
        <button class="toggle-vis" data-target="googleKey">Show</button>
      </div>
      <div class="status-badge unsaved" id="googleStatus">Not saved</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">System Prompt</div>
    <textarea id="systemPrompt" class="input" placeholder="You are a helpful assistant."></textarea>
  </div>

  <div class="section">
    <div class="section-title">Temperature</div>
    <div class="row items-center" style="display:flex;align-items:center;gap:16px;">
      <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" style="flex:1;">
      <span id="tempValue" style="min-width:32px;text-align:center;font-size:15px;font-weight:600;font-family:var(--font-heading);color:var(--accent);">0.7</span>
    </div>
  </div>

  <div class="save-bar">
    <button class="btn btn-primary" id="saveBtn">Save Settings</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
