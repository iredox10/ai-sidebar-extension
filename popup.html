<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="layout-popup">
  
  <div class="popup-hero">
    <div class="popup-hero-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
      Sidebar AI
    </div>
    
    <div class="popup-status">
      <span class="status-indicator" id="statusDot"></span>
      <span id="statusText">Checking configuration...</span>
    </div>

    <div style="font-size: 11px; color: var(--text-tertiary); display: flex; flex-direction: column; gap: 4px; border-top: 1px solid var(--border-subtle); padding-top: 12px; margin-top: 4px;">
      <div style="display: flex; justify-content: space-between;">
        <span>Provider</span>
        <span id="activeProvider" style="color: var(--text-primary); font-family: var(--font-mono);">—</span>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <span>Model</span>
        <span id="activeModel" style="color: var(--text-primary); font-family: var(--font-mono); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right;">—</span>
      </div>
    </div>
  </div>

  <div class="popup-actions">
    <button class="btn-block btn-primary" id="openSidebar">
      Open Chat Sidebar
    </button>
    <button class="btn-block btn-secondary" id="openSettings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
      Preferences
    </button>
  </div>

  <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border-subtle); text-align: center;">
    <a href="#" id="askSelected" style="color: var(--text-tertiary); font-size: 11px; text-decoration: none; transition: color 0.15s;">
      Ask about selected text
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
