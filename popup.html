<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sidebar</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 300px;
      padding: 0;
      overflow: hidden;
    }
    .popup-gradient {
      background: linear-gradient(160deg, #0a0a14 0%, #111128 50%, #0d1520 100%);
      padding: 20px;
    }
    .popup-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .popup-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading);
      font-size: 16px; font-weight: 700; color: #0a0a14;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .popup-title { font-size: 16px; font-weight: 600; }
    .status-row {
      display: flex; align-items: center; gap: 8px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    .status-dot.on { background: var(--success); box-shadow: 0 0 6px var(--success-bg); }
    .status-dot.off { background: var(--text-muted); animation: none; }
    .status-label { font-size: 12px; color: var(--text-secondary); }

    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 16px;
    }
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .info-card .info-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      font-weight: 600; margin-bottom: 3px;
    }
    .info-card .info-value {
      font-size: 13px; font-weight: 500;
    }
    .info-card .info-value.muted {
      color: var(--text-muted); font-weight: 400;
    }

    .actions {
      display: flex; flex-direction: column; gap: 8px;
    }
    .actions button {
      width: 100%; justify-content: center; padding: 10px;
      font-size: 13px;
    }

    .footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: center;
    }
    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .footer a:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="popup-gradient">
    <div class="popup-header">
      <div class="popup-icon">AI</div>
      <div>
        <div class="popup-title">AI Sidebar</div>
        <div class="status-row">
          <span class="status-dot off" id="statusDot"></span>
          <span class="status-label" id="statusText">Not configured</span>
        </div>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Provider</div>
        <div class="info-value" id="activeProvider">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">Model</div>
        <div class="info-value" id="activeModel">—</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="openSidebar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
        </svg>
        Open Sidebar
      </button>
      <button class="btn btn-secondary" id="openSettings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
        </svg>
        Settings
      </button>
    </div>

    <div class="footer">
      <a href="#" id="askSelected">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path></svg>
        Ask about selected text
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
